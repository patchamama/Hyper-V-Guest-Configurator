<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hyper-V Guest Configurator</title>
<style>
:root {
  --bg:         #0d1117;
  --sur:        #161b22;
  --sur2:       #21262d;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #8b949e;
  --accent:     #58a6ff;
  --accent-rgb: 88, 166, 255;
  --green:      #3fb950;
  --yellow:     #d29922;
  --red:        #f85149;
  --elo-orange: #E8820C;
  --elo-blue:   #4a9fd4;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:       'Cascadia Code', 'Consolas', monospace;
}
[data-theme="light"] {
  --bg:         #FFFFFF;
  --sur:        #F5F5F5;
  --sur2:       #EBEBEB;
  --border:     #CCCCCC;
  --text:       #1A1A1A;
  --muted:      #666666;
  --accent:     #0060A8;
  --accent-rgb: 0, 96, 168;
  --green:      #2E7D32;
  --yellow:     #C65100;
  --red:        #C62828;
  --elo-orange: #E8820C;
  --elo-blue:   #0060A8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{background:var(--sur);border-bottom:1px solid var(--border);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
header h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
.dot.on{background:var(--green)}
.ml{margin-left:auto}
.hbtn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.hbtn:hover{color:var(--text);border-color:var(--muted)}

/* Layout */
.body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:220px;background:var(--sur);border-right:1px solid var(--border);overflow-y:auto;padding:12px 8px;flex-shrink:0}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .12s;user-select:none}
.nav-item:hover{background:var(--sur2)}
.nav-item.active{background:rgba(var(--accent-rgb),.13);color:var(--accent)}
.nav-item.ok .num{background:var(--green);color:var(--bg);border-color:var(--green)}
.nav-item.err .num{background:var(--red);color:#fff;border-color:var(--red)}
.nav-item.run .num{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.num{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--sur2);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.nav-label{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Main */
.main{flex:1;overflow-y:auto;padding:24px}
.panel{display:none;animation:fadeIn .15s ease}
.panel.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--sur);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:600;margin-bottom:4px}
.card .sub{color:var(--muted);font-size:13px;margin-bottom:18px;line-height:1.5}

/* Option grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.opt{background:var(--sur2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:border-color .15s,background .15s;user-select:none}
.opt:hover{border-color:var(--accent)}
.opt.sel{border-color:var(--accent);background:rgba(var(--accent-rgb),.09)}
.opt.warn{border-color:var(--yellow)}
.chk{width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.opt.sel .chk{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.radio .chk{border-radius:50%}
.opt-name{font-size:13px;font-weight:500;line-height:1.4}
.opt-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.opt-sub.expired{color:var(--red)}

/* Button row */
.brow{display:flex;gap:8px;margin-top:18px;align-items:center}
.btn{padding:7px 16px;border-radius:6px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;font-family:var(--font)}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--elo-orange);color:#fff}
.btn-g{background:var(--green);color:var(--bg)}
.btn-r{background:var(--red);color:#fff}
.btn-o{background:var(--sur2);color:var(--text);border:1px solid var(--border)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Form */
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}
input[type=text],input[type=password]{background:var(--sur2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;padding:7px 12px;width:100%;outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}

/* Tags */
.tag{display:inline-flex;align-items:center;background:rgba(var(--accent-rgb),.13);border:1px solid rgba(var(--accent-rgb),.3);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:11px;margin:2px;gap:6px}
.tag .x{cursor:pointer;color:var(--muted);font-size:12px;line-height:1}
.tag .x:hover{color:var(--red)}

/* Execution steps */
.exec-list{display:flex;flex-direction:column;gap:8px}
.estep{background:var(--sur2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.estep.run{border-color:var(--accent)}
.estep.ok{border-color:var(--green)}
.estep.err{border-color:var(--red)}
.estep.skip{opacity:.5}
.eicon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-size:14px;font-weight:500}
.esub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-pen{background:var(--sur);color:var(--muted);border:1px solid var(--border)}
.b-run{background:rgba(var(--accent-rgb),.2);color:var(--accent)}
.b-ok {background:rgba(63,185,80,.2);color:var(--green)}
.b-err{background:rgba(248,81,73,.2);color:var(--red)}
.b-skip{background:var(--sur);color:var(--muted);border:1px solid var(--border)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.b-run{animation:pulse 1.4s infinite}

/* Log footer */
.logfooter{height:190px;flex-shrink:0;background:var(--sur);border-top:1px solid var(--border);display:flex;flex-direction:column}
.loghdr{padding:7px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logbody{flex:1;overflow-y:auto;padding:8px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.6}
.ll{white-space:pre-wrap;word-break:break-all}
.ll.err{color:var(--red)}
.ll.sys{color:var(--muted);font-style:italic}
.ll.ok {color:var(--green)}

/* Summary box */
.sumbox{background:var(--sur2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-top:12px}
.sumbox table{width:100%;border-collapse:collapse}
.sumbox td{padding:4px 0;font-size:12px;vertical-align:top}
.sumbox td:first-child{color:var(--muted);width:140px}

/* Alert */
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:12px;line-height:1.5}
.al-info{background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.25)}
.al-warn{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.25)}

/* Folder header */
.fhdr{font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;display:flex;align-items:center;gap:10px}
.flink{font-size:11px;color:var(--accent);cursor:pointer;font-weight:400}
.flink:hover{text-decoration:underline}

/* File list */
.file-list{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.file-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:5px;cursor:pointer;transition:background .12s;user-select:none;border:1px solid transparent}
.file-row:hover{background:var(--sur2)}
.file-row.sel{background:rgba(var(--accent-rgb),.08);border-color:rgba(var(--accent-rgb),.25)}
.file-row .chk{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.file-row.sel .chk{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.file-icon{font-size:14px;flex-shrink:0}
.file-name{font-size:13px;font-family:var(--mono);color:var(--text);flex:1}
.file-size{font-size:11px;color:var(--muted);white-space:nowrap;margin-left:auto}

/* Progress bar */
.pbar-wrap{background:var(--border);border-radius:4px;height:4px;overflow:hidden;margin-top:8px}
.pbar{background:var(--elo-orange);height:100%;transition:width .3s;border-radius:4px}

/* Theme toggle */
.theme-toggle{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 10px;font-size:14px;cursor:pointer;transition:all .15s;line-height:1}
.theme-toggle:hover{color:var(--text);border-color:var(--muted)}
</style>
</head>
<body>

<header>
  <div class="dot" id="wsDot"></div>
  <h1>⚙ Hyper-V Guest Configurator</h1>
  <div class="ml" style="display:flex;gap:8px">
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    <button class="hbtn" onclick="App.resetState()">↺ Reset</button>
    <button class="hbtn" onclick="App.showPanel('execute')" style="color:var(--green);border-color:var(--green)">▶ Execute</button>
  </div>
</header>

<div class="body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>
<footer class="logfooter">
  <div class="loghdr">
    <span>Execution Log</span>
    <button class="hbtn" onclick="Log.clear()">Clear</button>
  </div>
  <div class="logbody" id="logbody"></div>
</footer>

<script>
// ── Log ──────────────────────────────────────────────────────────────────────
const Log = {
  el: () => document.getElementById('logbody'),
  append(text, cls = '') {
    const el = this.el();
    const d = document.createElement('div');
    d.className = 'll ' + cls;
    d.textContent = text;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  },
  clear() { this.el().innerHTML = ''; },
  sys(t) { this.append(t, 'sys'); },
  ok(t)  { this.append(t, 'ok');  },
  err(t) { this.append(t, 'err'); },
};

// ── WebSocket ────────────────────────────────────────────────────────────────
const WS = {
  conn: null,
  onDone: null,
  connect() {
    this.conn = new WebSocket(`ws://${location.host}`);
    this.conn.onopen  = () => document.getElementById('wsDot').className = 'dot on';
    this.conn.onclose = () => { document.getElementById('wsDot').className = 'dot'; setTimeout(() => this.connect(), 3000); };
    this.conn.onmessage = e => this.handle(JSON.parse(e.data));
  },
  handle(msg) {
    if (msg.type === 'out') {
      const _t = msg.text.trim();
      if (!_t.startsWith('DLPROG:') && !_t.startsWith('TASK:')) Log.append(msg.text);
      try { Exec.outHook?.(msg.text); } catch (e) { /* ignore hook errors */ }
    }
    else if (msg.type === 'err')  Log.err(msg.text);
    else if (msg.type === 'done') {
      const code = msg.code;
      Log.sys(`[exit ${code}]`);
      const cb = this.onDone;
      this.onDone = null;
      if (cb) cb(code === null ? -1 : code);
      else    Log.err('[warn] done arrived but no callback was registered');
    }
    else if (msg.type === 'error')     Log.err('[error] ' + msg.text);
    else if (msg.type === 'cancelled') Log.sys('[cancelled]');
  },
  run(script, onDone) {
    this.onDone = onDone;
    this.conn.send(JSON.stringify({ type: 'run', script }));
  },
  cancel() { this.conn.send(JSON.stringify({ type: 'cancel' })); },
};

// ── App state ────────────────────────────────────────────────────────────────
const S = {
  vmName: '', features: [], models: [], downloadUrls: [],
  localFiles: [], wingetPkgs: [], installMode: 'copy-only',
  vmUser: '', vmPass: '', completed: [],
  copyMethod: 'http',
};

let vms = [], downloads = [], softwares = [], winget = [], models = [];
let scriptDir = 'C:\\ollama-ssl\\installator';

// ── Catalogues & helpers ──────────────────────────────────────────────────────
const FEATURE_OPTS = [
  { label: 'Full WSL2 + AI Stack',     sub: 'WSL + Docker + Ollama',          val: ['wsl-ai']           },
  { label: 'Software Packages',        sub: 'Install apps on the guest VM',   val: ['software']          },
  { label: 'WSL Preparation',          sub: 'Minimal setup, no WSL install',  val: ['wsl-prep']          },
  { label: 'WSL Prep + Software',      sub: 'Preparation + software install', val: ['wsl-prep','software']},
  { label: 'Full Stack + Software',    sub: 'WSL2 + AI + software packages',  val: ['wsl-ai','software'] },
];
const MODE_OPTS = [
  { label: 'Silent',      sub: 'Fully automated',               val: 'silent'      },
  { label: 'Interactive', sub: 'Launch each installer with UI', val: 'interactive' },
  { label: 'Copy Only',   sub: 'Copy files, do not run',        val: 'copy-only'   },
];
const isExpired = url => { const m = url.match(/[?&]expire=(\d+)/); return m ? +m[1] < Date.now()/1000 : false; };
const e = s => s.replace(/"/g, '`"');
const hasSoftware = () => S.features.includes('software');
const hasWSL      = () => S.features.includes('wsl-ai');
const hasWSLPrep  = () => S.features.includes('wsl-prep');

// ── Sidebar navigation ────────────────────────────────────────────────────────
const NAV = [
  { id: 'features',    label: 'Features',       sec: 'Configure' },
  { id: 'vm',          label: 'VM',             sec: null        },
  { id: 'models',      label: 'Ollama Models',  sec: null        },
  { id: 'downloads',   label: 'Downloads',      sec: null        },
  { id: 'local',       label: 'Local Files',    sec: null        },
  { id: 'winget',      label: 'Winget',         sec: null        },
  { id: 'installmode', label: 'Install Mode',   sec: null        },
  { id: 'credentials', label: 'Credentials',    sec: null        },
  { id: 'execute',     label: 'Execute',        sec: 'Run'       },
  { id: 'help',        label: 'Help',           sec: 'Help'      },
];

let currentPanel = 'features';

function renderSidebar() {
  let lastSec = '', html = '';
  NAV.forEach((n, i) => {
    if (n.sec && n.sec !== lastSec) { html += `<div class="sec-label">${n.sec}</div>`; lastSec = n.sec; }
    const done = isDone(n.id);
    const active = n.id === currentPanel;
    html += `<div class="nav-item ${active?'active':''} ${done&&!active?'ok':''}" onclick="App.showPanel('${n.id}')">
      <div class="num">${done ? '✓' : i+1}</div>
      <div class="nav-label">${n.label}</div>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

function isDone(id) {
  return {
    features:    S.features.length > 0,
    vm:          !!S.vmName,
    models:      S.models.length > 0 || !hasWSL(),
    downloads:   S.downloadUrls.length > 0,
    local:       S.localFiles.length > 0,
    winget:      S.wingetPkgs.length > 0,
    installmode: S.localFiles.length > 0,
    credentials: !!S.vmUser,
    execute:     false,
  }[id] ?? false;
}

// ── Panel system ──────────────────────────────────────────────────────────────
const App = {
  showPanel(id) {
    currentPanel = id;
    renderSidebar();
    document.getElementById('main').innerHTML = '';
    const p = document.createElement('div');
    p.className = 'panel show';
    p.innerHTML = panels[id]?.() || '<div class="card"><h2>Coming soon</h2></div>';
    document.getElementById('main').appendChild(p);
  },
  async resetState() {
    if (!confirm('Reset all progress and selections?')) return;
    await fetch('/api/state', { method: 'DELETE' });
    Object.assign(S, { vmName:'', features:[], models:[], downloadUrls:[], localFiles:[], wingetPkgs:[], installMode:'copy-only', vmUser:'', vmPass:'', completed:[], copyMethod:'http' });
    renderSidebar();
    this.showPanel('features');
  },
  async saveState() {
    await fetch('/api/state', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ VMName:S.vmName, Features:S.features, Models:S.models, DownloadUrls:S.downloadUrls, LocalFiles:S.localFiles, WingetPkgs:S.wingetPkgs, InstallMode:S.installMode, Completed:S.completed, CopyMethod:S.copyMethod }),
    });
  },
};

// ── Panel renderers ───────────────────────────────────────────────────────────
const panels = {

  // Feature selection
  features() {
    const opts = FEATURE_OPTS.map((o, i) => {
      const sel = JSON.stringify(S.features) === JSON.stringify(o.val);
      return `<div class="opt radio ${sel?'sel':''}" onclick="selectFeature(${i})">
        <div class="chk">${sel?'●':''}</div>
        <div><div class="opt-name">${o.label}</div><div class="opt-sub">${o.sub}</div></div>
      </div>`;
    }).join('');
    return `<div class="card">
      <h2>Feature Selection</h2>
      <p class="sub">What do you want to configure on the guest VM?</p>
      <div class="grid">${opts}</div>
      <div class="brow"><button class="btn btn-p" onclick="App.showPanel('vm')">Continue →</button></div>
    </div>`;
  },

  // VM selection
  vm() {
    const rows = vms.map(v => {
      const sel = S.vmName === v.Name;
      const run = v.State === 'Running';
      return `<div class="opt radio ${sel?'sel':''}" onclick="S.vmName='${v.Name}';App.showPanel('vm')">
        <div class="chk">${sel?'●':''}</div>
        <div>
          <div class="opt-name">${v.Name}</div>
          <div class="opt-sub">State: <span style="color:${run?'var(--green)':'var(--muted)'}">${v.State}</span> &nbsp;·&nbsp; ${v.MemGB} GB</div>
        </div>
      </div>`;
    }).join('');
    const noVms = !rows
      ? `<div class="alert al-warn">
          No Hyper-V VMs found. Make sure the server runs as <strong>Administrator</strong> and Hyper-V is installed.<br>
          <a href="/api/vms/debug" target="_blank" style="color:var(--accent);font-size:12px">View raw debug output →</a>
         </div>`
      : '';
    return `<div class="card">
      <h2>VM Selection</h2>
      <p class="sub">Select the Hyper-V guest VM to configure. Running VMs appear first.</p>
      ${noVms}
      <div class="grid">${rows}</div>
      <div class="brow">
        <button class="btn btn-o" onclick="App.showPanel('features')">← Back</button>
        <button class="btn btn-p" onclick="goFromVM()">Continue →</button>
        <button class="hbtn" onclick="reloadVMs()" style="margin-left:4px">↺ Refresh</button>
      </div>
    </div>`;
  },

  // Ollama models
  models() {
    const notice = !hasWSL()
      ? `<div class="alert al-warn">⚠ Ollama models are only pulled when <strong>Full WSL2 + AI Stack</strong> is selected. Your current feature set does not include it — selections here will be saved but not used.</div>`
      : '';
    const opts = models.map(m => {
      const sel = S.models.includes(m.tag);
      return `<div class="opt ${sel?'sel':''}" onclick="toggleArr(S.models,'${m.tag}');App.showPanel('models')">
        <div class="chk">${sel?'✓':''}</div>
        <div><div class="opt-name">${m.tag}</div><div class="opt-sub">${m.desc}</div></div>
      </div>`;
    }).join('');
    const tags = S.models.map(t => `<span class="tag">${t}<span class="x" onclick="toggleArr(S.models,'${t}');App.showPanel('models')">✕</span></span>`).join('');
    return `<div class="card">
      <h2>Ollama Models</h2>
      <p class="sub">Select models to pull during deployment via <code>ollama pull</code>.</p>
      ${notice}
      <div class="grid">${opts}</div>
      <div style="margin-top:14px">
        <div class="fg">
          <label class="fl">Custom model tag (e.g. llava:latest)</label>
          <div style="display:flex;gap:8px;max-width:340px">
            <input type="text" id="customModel" placeholder="e.g. llava:latest">
            <button class="btn btn-o" onclick="addCustomModel()" style="white-space:nowrap">Add</button>
          </div>
        </div>
        ${tags ? `<div style="margin-top:8px">${tags}</div>` : ''}
      </div>
      <div class="brow">
        <button class="btn btn-o" onclick="App.showPanel('vm')">← Back</button>
        <button class="btn btn-p" onclick="App.showPanel('downloads')">Continue →</button>
      </div>
    </div>`;
  },

  // Direct downloads
  downloads() {
    if (!downloads.length) return `<div class="card"><h2>Direct Downloads</h2>
      <p class="sub">No entries in downloads.txt.</p>
      <div class="brow"><button class="btn btn-o" onclick="App.showPanel('models')">← Back</button>
      <button class="btn btn-p" onclick="App.showPanel('local')">Continue →</button></div></div>`;

    const expCount = downloads.filter(d => isExpired(d.url)).length;

    </div>

    const opts = downloads.map((d, i) => {
      const sel = S.downloadUrls.includes(d.url);
      const exp = isExpired(d.url);
      return `<div class="opt ${sel?'sel':''} ${exp?'warn':''}" onclick="toggleArr(S.downloadUrls,'${d.url.replace(/'/g,"\\'")}');App.showPanel('downloads')">

    }).join('');
    return `<div class="card">

// ── Execution engine ──────────────────────────────────────────────────────────
const Exec = {
  queue: [],
  current: null,
  outHook: null,

  runAll() {
    const steps = buildSteps().filter(s => !S.completed.includes(s.id));
    if (!steps.length) { Log.sys('All steps already completed.'); return; }
    this.queue = steps.slice(1).map(s => s.id);
    this.runStep(steps[0].id);
  },

  runStep(id) {
    const steps = buildSteps();
    const step = steps.find(s => s.id === id);
    if (!step) return;
    this.current = id;
    this.setStatus(id, 'run', 'Running…');
    setCancelVisible(true);
    Log.sys(`\n▶ ${step.label}\n`);

    if (step.dlprog) {
      const wrap  = document.getElementById(`pb-${id}`);
      const dlRow = document.getElementById(`dlrow-${id}`);
      if (wrap)  wrap.style.display  = '';
      if (dlRow) dlRow.style.display = '';
      const fileNames = (step.dlFilesFrom === 'localFiles' ? S.localFiles : S.downloadUrls)
        .map(u => u.split('?')[0].split('/').pop());
      const total = fileNames.length;
      let done = 0;
      if (dlRow) {
        dlRow.innerHTML = fileNames.map((fn, i) => `
          <div style="margin-top:6px">
            <div style="color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${fn}">${fn}</div>
            <div style="background:var(--border);border-radius:3px;height:3px;overflow:hidden;margin-top:2px">
              <div id="dlbar-${id}-${i}" style="background:var(--elo-orange);height:100%;width:0%;transition:width .5s;border-radius:3px"></div>
            </div>
            <div id="dllabel-${id}-${i}" style="color:var(--muted);font-size:10px;margin-top:1px">Waiting…</div>
          </div>`).join('');
      }
      const fnToIdx = {};
      fileNames.forEach((fn, i) => { fnToIdx[fn] = i; });
      this.outHook = text => {
        for (const line of text.split('\n')) {
          const l = line.trim();
          const m = l.match(/^DLPROG:(.+):([^:]+):([^:]+):(\d+)$/);
          if (m) {
            const [, fn, doneMB, totalMB, pct] = m;
            const idx = fnToIdx[fn];
            if (idx !== undefined) {
              const bar = document.getElementById(`dlbar-${id}-${idx}`);
              const lbl = document.getElementById(`dllabel-${id}-${idx}`);
              if (bar) bar.style.width = pct + '%';
              if (lbl) lbl.textContent = totalMB === '-1' ? `${doneMB} MB` : `${doneMB} / ${totalMB} MB`;
            }
            continue;
          }
          if (/^Done: /.test(l)) {
            done++;
            const overall = wrap?.querySelector('.pbar');
            if (overall) overall.style.width = Math.min(100, Math.round(done / total * 100)) + '%';
            const fn = l.slice(6).trim();
            const idx = fnToIdx[fn];
            if (idx !== undefined) {
              const fbar = document.getElementById(`dlbar-${id}-${idx}`);
              const flbl = document.getElementById(`dllabel-${id}-${idx}`);
              if (fbar) fbar.style.width = '100%';
              if (flbl) { flbl.textContent = '✓ Done'; flbl.style.color = 'var(--green)'; }
            }
          }
        }
      };
    } else if (step.composeprog) {
      const wrap   = document.getElementById(`pb-${id}`);
      const taskEl = document.getElementById(`subtask-${id}`);
      if (wrap)   wrap.style.display   = '';
      if (taskEl) taskEl.style.display = '';
      const totalModels = S.models.length;
      let doneModels    = 0;
      this.outHook = text => {
        for (const line of text.split('\n')) {
          const l = line.trim();
          if (!l.startsWith('TASK:')) continue;
          const task = l.slice(5);
          if (taskEl) {
            taskEl.textContent = task;
            const done = task.includes(' ready') || task === 'Deployment complete' || task === 'Containers started' || task === 'Docker daemon ready';
            taskEl.style.color = done ? 'var(--green)' : 'var(--accent)';
          }
          const bar = wrap?.querySelector('.pbar');
          if (bar) {
            if (task.includes(' ready (') && totalModels > 0) {
              doneModels++;
              bar.style.width = Math.min(99, Math.round(doneModels / totalModels * 100)) + '%';
            }
            if (task === 'Deployment complete') bar.style.width = '100%';
          }
        }
      };
    } else if (step.progress) {
      const { total, pattern } = step.progress;
      const wrap = document.getElementById(`pb-${id}`);
      if (wrap) wrap.style.display = '';
      let count = 0;
      this.outHook = text => {
        for (const line of text.split('\n')) {
          if (pattern.test(line.trim())) {
            count++;
            const bar = wrap?.querySelector('.pbar');
            if (bar) bar.style.width = Math.min(100, Math.round(count / total * 100)) + '%';
          }
        }
      };
    }

    WS.run(step.script, code => {
      try {
        setCancelVisible(false);
        this.current = null;
        this.outHook = null;
        if (code === 0) {
          S.completed.push(id);
          App.saveState().catch(err => Log.err('[save] ' + (err?.message || err)));
          this.setStatus(id, 'ok', 'Done');
          renderSidebar();
          if (this.queue.length) this.runStep(this.queue.shift());
        } else {
          this.setStatus(id, 'err', 'Error');
          this.queue = [];
        }
      } catch (err) {
        Log.err('[step callback error] ' + (err?.message || err));
      }
    });
  },

  cancel() {
    WS.cancel();
    this.queue = [];
    this.outHook = null;
    if (this.current) this.setStatus(this.current, 'err', 'Cancelled');
    this.current = null;
    setCancelVisible(false);
  },

  setStatus(id, cls, label) {
    const el = document.getElementById(`es-${id}`);
    const badge = document.getElementById(`b-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    if (!el) return;
    el.className = `estep ${cls}`;
    const icons = { run:'⏳', ok:'✅', err:'❌', pen:'⬜' };
    const bcls  = { run:'b-run', ok:'b-ok', err:'b-err', pen:'b-pen' };
    const icon  = el.querySelector('.eicon');
    if (icon)  icon.textContent  = icons[cls] || '⬜';
    if (badge) { badge.className = 'badge ' + (bcls[cls]||'b-pen'); badge.textContent = label; }
    if (btn)   btn.style.display = (cls === 'ok') ? 'none' : '';
    if (btn)   btn.disabled = (cls === 'run');
  },
};

function setCancelVisible(v) {
  const b = document.getElementById('cancelBtn');
  if (b) b.style.display = v ? '' : 'none';
}

// ── ELO token refresh flow ────────────────────────────────────────────────────
const EloRefresh = {
  async start() {
    const box = document.getElementById('eloRefreshBox');
    if (!box) return;
    box.style.display = '';
    box.innerHTML = `<div class="alert al-info" style="margin-top:8px">
      <strong>Playwright browser launching…</strong><br><br>
      <ol style="padding-left:20px;line-height:2.2;margin-bottom:12px">
        <li>Log in at <a href="https://partner.elo.com" target="_blank" style="color:var(--accent)">partner.elo.com</a></li>
        <li>Navigate to <strong>Software Downloads</strong></li>
        <li>Click each download link you need (ELO Server Setup, Java Client, XC…)</li>
        <li>Return here and click <strong>Done</strong></li>
      </ol>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-g" id="eloDoneBtn" onclick="EloRefresh.done(this)">&#10003; Done — close browser &amp; save tokens</button>
        <span id="eloStatus" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>`;
    const r = await fetch('/api/refresh-elo-tokens/start', { method: 'POST' })
      .then(x => x.json()).catch(e => ({ error: e.message }));
    if (r.error) {
      const s = document.getElementById('eloStatus');
      if (s) s.textContent = 'Error: ' + r.error;
    }
  },

  async done(btn) {
    const s = document.getElementById('eloStatus');
    if (btn) btn.disabled = true;
    if (s) s.textContent = 'Closing browser…';
    await fetch('/api/refresh-elo-tokens/done', { method: 'POST' }).catch(() => {});
    // Poll until the node process exits
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 500));
      const st = await fetch('/api/refresh-elo-tokens/status').then(r => r.json()).catch(() => ({ running: true }));
      if (!st.running) break;
    }
    if (s) s.textContent = 'Reloading downloads…';
    const fresh = await fetch('/api/downloads').then(r => r.json()).catch(() => []);
    downloads = Array.isArray(fresh) ? fresh : [];
    // Remap selected URLs to fresh ones by filename
    const fnMap = {};
    downloads.forEach(d => { const fn = d.url.split('?')[0].split('/').pop(); fnMap[fn] = d.url; });
    S.downloadUrls = S.downloadUrls.map(url => { const fn = url.split('?')[0].split('/').pop(); return fnMap[fn] || url; });
    await App.saveState().catch(() => {});
    App.showPanel('downloads');
  },
};

// ── Step builders ─────────────────────────────────────────────────────────────
function buildSteps() {
  const steps = [];
  if (hasSoftware() || hasWSLPrep()) {
    steps.push({ id: 'guest-services', label: 'Enable Guest Services', sub: 'Required for VM communication', script: psGuestServices() });
  }
  if (S.downloadUrls.length) {
    const hasExpiredTokens = S.downloadUrls.some(isExpired);
    steps.push({ id: 'software-download', label: 'Download Installers in VM', sub: `${S.downloadUrls.length} file(s) to download directly in VM`, warn: hasExpiredTokens ? 'Expired tokens detected — refresh them in the Downloads panel before running.' : null, dlprog: true, script: psDownload() });
  }
  if (S.localFiles.length) {
    steps.push({ id: 'software-copy', label: 'Copy Local Files to VM', sub: `${S.localFiles.length} file(s) → C:\\Install  [${S.copyMethod === 'http' ? 'HTTP' : 'PSSession'}]`, dlprog: S.copyMethod === 'http', dlFilesFrom: 'localFiles', progress: S.copyMethod === 'http' ? null : { total: S.localFiles.length, pattern: /^Copied: / }, script: psCopy() });
  }
  if (S.localFiles.length && S.installMode !== 'copy-only') {
    steps.push({ id: 'software-install-local', label: 'Install Local Software', sub: `Mode: ${S.installMode}`, script: psInstallLocal() });
  }
  if (S.wingetPkgs.length) {
    steps.push({ id: 'software-install-winget', label: 'Install Winget Packages', sub: `${S.wingetPkgs.length} package(s)`, script: psWinget() });
  }
  if (hasWSLPrep() || hasWSL()) {
    steps.push({ id: 'nested-virt', label: 'Enable Nested Virtualization', sub: 'Required for WSL2 inside VM', script: psNestedVirt() });
    steps.push({ id: 'wsl-features', label: 'Enable WSL Features in VM', sub: 'DISM VirtualMachinePlatform + WSL', script: psWSLFeatures() });
  }
  if (hasWSL()) {
    steps.push({ id: 'wsl-install', label: 'Install WSL2 Kernel', sub: 'Downloads and installs WSL2 MSI inside VM', script: psWSLInstall() });
    steps.push({ id: 'docker-install', label: 'Install Docker Desktop', sub: 'Chocolatey + Docker Desktop inside VM', script: psDockerInstall() });
    steps.push({ id: 'compose-up', label: 'Deploy Ollama + Caddy', sub: `Models: ${S.models.join(', ') || 'none'}`, composeprog: true, script: psComposeUp(), warn: 'Docker Desktop must be running inside the VM before this step.' });
  }
  return steps;
}

// ── PowerShell script builders ────────────────────────────────────────────────
function psCred() {
  return `$cred = New-Object PSCredential("${e(S.vmUser)}", (ConvertTo-SecureString "${e(S.vmPass)}" -AsPlainText -Force)); $VMName = "${e(S.vmName)}";\n`;
}

function psGuestServices() {
  return psCred() + `
$svc = (Get-VM -Name $VMName).VMIntegrationService | Where-Object { $_.Name -eq "Guest Service Interface" }
if ($null -ne $svc -and -not $svc.Enabled) {
    Enable-VMIntegrationService -VMName $VMName -Name "Guest Service Interface"
    Write-Output "Guest Service Interface enabled -- restarting VM..."
    Restart-VM $VMName -Force
    $dl = (Get-Date).AddSeconds(300)
    while ((Get-Date) -lt $dl) {
        try { Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock { 1 } -ErrorAction Stop; Write-Output "VM ready."; break }
        catch { Start-Sleep 5; Write-Output "Waiting for VM..." }
    }
} else { Write-Output "Guest Service Interface already active." }`;
}

function psDownload() {
  const perFile = S.downloadUrls.map(url => {
    const fn = url.split('?')[0].split('/').pop();
    const stem = fn.replace(/\.zip$/i, '');
    const expand = fn.toLowerCase().endsWith('.zip')
      ? `\n    Expand-Archive -Path "C:\\Install\\${fn}" -DestinationPath "C:\\Install\\${stem}" -Force\n    Write-Output "Extracted: ${stem}"`
      : '';
    return `Write-Output "Downloading ${fn}..."
try {
    Invoke-VMDownload "${e(url)}" "C:\\Install\\${fn}"
    Write-Output "Done: ${fn}"${expand}
} catch {
    $script:failed += "${fn}"
    Write-Output "FAILED: ${fn} -- $($_.Exception.Message)"
}`;
  }).join('\n\n');

  return psCred() + `
[System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12

function Invoke-VMDownload([string]$Url, [string]$DestPath) {
    $fileName   = $Url.Split('?')[0].Split('/')[-1]
    $totalBytes = [long]-1
    try {
        $req = [System.Net.HttpWebRequest]::Create($Url)
        $req.Method = "HEAD"; $req.AllowAutoRedirect = $true
        $resp = $req.GetResponse(); $totalBytes = $resp.ContentLength; $resp.Close()
    } catch {}

    $dlSess   = New-PSSession -VMName $script:VMName -Credential $script:cred
    $pollSess = New-PSSession -VMName $script:VMName -Credential $script:cred
    $dlJob    = $null
    try {
        Invoke-Command -Session $pollSess -ScriptBlock {
            New-Item -ItemType Directory -Path (Split-Path $using:DestPath -Parent) -Force | Out-Null
        }
        $dlJob = Invoke-Command -Session $dlSess -AsJob -ScriptBlock {
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
            (New-Object System.Net.WebClient).DownloadFile($using:Url, $using:DestPath)
        }
        while ($dlJob.State -eq 'Running') {
            Start-Sleep -Seconds 2
            try {
                $done = Invoke-Command -Session $pollSess -ScriptBlock {
                    if (Test-Path $using:DestPath) { (Get-Item $using:DestPath).Length } else { [long]0 }
                }
                $doneMB = [math]::Round($done / 1MB, 1)
                if ($totalBytes -gt 0) {
                    $pct     = [int]([math]::Min(99, $done * 100 / $totalBytes))
                    $totalMB = [math]::Round($totalBytes / 1MB, 1)
                    Write-Output ("DLPROG:{0}:{1}:{2}:{3}" -f $fileName, $doneMB, $totalMB, $pct)
                } else {
                    Write-Output ("DLPROG:{0}:{1}:-1:0" -f $fileName, $doneMB)
                }
            } catch {}
        }
        $msg = $null
        try { Receive-Job $dlJob -Wait -ErrorAction Stop | Out-Null }
        catch {
            $msg = if ($_.Exception.InnerException) { $_.Exception.InnerException.Message } else { $_.Exception.Message }
        }
        if ($msg) { throw "Download failed for '$fileName': $msg" }
    } finally {
        if ($null -ne $dlJob) { Remove-Job $dlJob -Force -ErrorAction SilentlyContinue }
        Remove-PSSession $dlSess   -ErrorAction SilentlyContinue
        Remove-PSSession $pollSess -ErrorAction SilentlyContinue
    }
}

$script:failed = @()
${perFile}
if ($script:failed.Count -gt 0) { throw "Downloads failed: $($script:failed -join ', ')" }
`;
}

function psCopy() {
  return S.copyMethod === 'http' ? psCopyViaHttp() : psCopyViaPSSession();
}

function psCopyViaPSSession() {
  const lines = S.localFiles.map(rel => {
    const winRel = rel.replace(/\//g, '\\');
    const src = `${scriptDir}\\softwares\\${winRel}`;
    return `Write-Output "Copying ${winRel}..."; Invoke-VMFileCopy "${e(src)}" "C:\\Install\\${winRel}"; Write-Output "Copied: ${winRel}";`;
  }).join('\n');

  const subdirs = [...new Set(
    S.localFiles.map(rel => rel.includes('/') ? rel.split('/').slice(0, -1).join('\\') : null).filter(Boolean)
  )];
  const mkSubdirs = subdirs.map(d => `New-Item -ItemType Directory "C:\\Install\\${d}" -Force | Out-Null`).join('; ');

  return psCred() + `
$copySession = New-PSSession -VMName $VMName -Credential $cred
Invoke-Command -Session $copySession -ScriptBlock {
    New-Item -ItemType Directory "C:\\Install" -Force | Out-Null
    ${mkSubdirs ? mkSubdirs : ''}
}

function Invoke-VMFileCopy($Src, $Dst) {
    try {
        $fileSize  = (Get-Item $Src).Length
        $chunkSize = 8MB
        $fs        = [System.IO.File]::OpenRead($Src)
        $copied    = [long]0
        try {
            $buf   = New-Object byte[] $chunkSize
            $first = $true
            while (($read = $fs.Read($buf, 0, $chunkSize)) -gt 0) {
                $chunk   = $buf[0..($read - 1)]
                $isFirst = $first
                $dest    = $Dst
                Invoke-Command -Session $copySession -ScriptBlock {
                    $mode = if ($using:isFirst) { [System.IO.FileMode]::Create } else { [System.IO.FileMode]::Append }
                    $rfs  = [System.IO.File]::Open($using:dest, $mode)
                    $c    = [byte[]]$using:chunk
                    try   { $rfs.Write($c, 0, $c.Length) }
                    finally { $rfs.Close() }
                }
                $copied += $read; $first = $false
                if ($fileSize -gt 1MB) {
                    Write-Output ("  {0:N1} / {1:N1} MB" -f ($copied / 1MB), ($fileSize / 1MB))
                }
            }
        } finally { $fs.Close() }
        return
    } catch { Write-Output "  PSSession chunk failed: $($_.Exception.Message)" }
    Write-Output "  Trying Copy-VMFile..."
    $max = 3; $n = 0
    while ($true) {
        try { Copy-VMFile -Name $VMName -SourcePath $Src -DestinationPath $Dst -FileSource Host -Force -ErrorAction Stop; return }
        catch {
            $n++
            if ($n -ge $max) { Write-Output "  [FAIL] $Dst"; throw }
            Write-Output "  Retry $n/$max - waiting 15s..."
            Start-Sleep 15
        }
    }
}
${lines}
Remove-PSSession $copySession -ErrorAction SilentlyContinue`;
}

function psCopyViaHttp() {
  const softRoot = `${scriptDir}\\softwares`;
  const perFile = S.localFiles.map(rel => {
    const winRel = rel.replace(/\//g, '\\');
    const fn = rel.split('/').pop();
    const stem = fn.replace(/\.zip$/i, '');
    const expand = fn.toLowerCase().endsWith('.zip')
      ? `\n    Invoke-Command -VMName $script:VMName -Credential $script:cred -ScriptBlock { Expand-Archive -Path "C:\\Install\\${winRel}" -DestinationPath "C:\\Install\\${stem}" -Force }\n    Write-Output "Extracted: ${stem}"`
      : '';
    return `Write-Output "Copying ${winRel}..."
try {
    Copy-ViaHttp "${winRel}"
    Write-Output "Done: ${fn}"${expand}
} catch {
    $script:failed += "${fn}"
    Write-Output "FAILED: ${fn} -- $($_.Exception.Message)"
}`;
  }).join('\n\n');

  return psCred() + `
$script:softRoot = "${e(softRoot)}"
$script:port     = Get-Random -Minimum 52000 -Maximum 53000
$script:ruleName = "HVWebCopy-$script:port"
$script:hostIp   = $null

$listener = [System.Net.HttpListener]::new()
$listener.Prefixes.Add("http://+:$script:port/")
$listener.Start()

New-NetFirewallRule -DisplayName $script:ruleName -Direction Inbound -Protocol TCP \`
    -LocalPort $script:port -Action Allow -ErrorAction SilentlyContinue | Out-Null

$switchName = (Get-VMNetworkAdapter -VMName $VMName | Select-Object -First 1).SwitchName
$script:hostIp = (Get-VMNetworkAdapter -ManagementOS |
    Where-Object { $_.SwitchName -eq $switchName } |
    Select-Object -ExpandProperty IPAddresses |
    Where-Object { $_ -match '^\\d+\\.\\d+\\.\\d+\\.\\d+$' -and $_ -notlike '169.254.*' } |
    Select-Object -First 1)
if (-not $script:hostIp) {
    $script:hostIp = (Get-NetIPAddress -AddressFamily IPv4 |
        Where-Object { ($_.InterfaceAlias -like '*Hyper-V*' -or $_.InterfaceAlias -like '*vEthernet*') \`
                       -and $_.IPAddress -notlike '127.*' -and $_.IPAddress -notlike '169.254.*' } |
        Select-Object -First 1).IPAddress
}
if (-not $script:hostIp) { throw "Cannot detect Hyper-V host IP. Ensure VM uses Internal or Default switch." }
Write-Output "Host file server: http://$script:hostIp\`:$script:port"

$runspace = [System.Management.Automation.Runspaces.RunspaceFactory]::CreateRunspace()
$runspace.Open()
$psCmd = [System.Management.Automation.PowerShell]::Create()
$psCmd.Runspace = $runspace
$psCmd.AddScript({
    param($lsnr, $root)
    while ($lsnr.IsListening) {
        try {
            $ctx  = $lsnr.GetContext()
            $resp = $ctx.Response
            $rel  = [System.Uri]::UnescapeDataString(
                        $ctx.Request.Url.AbsolutePath.TrimStart('/').Replace('/', '\\'))
            $path = Join-Path $root $rel
            if (Test-Path $path -PathType Leaf) {
                $resp.ContentType     = 'application/octet-stream'
                $resp.ContentLength64 = (Get-Item $path).Length
                $fs = [System.IO.File]::OpenRead($path)
                try   { $fs.CopyTo($resp.OutputStream) }
                finally { $fs.Close() }
                $resp.StatusCode = 200
            } elseif (Test-Path $path -PathType Container) {
                $relDisp  = $rel.TrimStart('\')
                $parentLi = if ($relDisp) { '<tr><td colspan="2"><a href="../">&#8593; Parent directory</a></td></tr>' } else { '' }
                $items    = @(Get-ChildItem $path | Sort-Object @{E={if ($_ -is [System.IO.DirectoryInfo]) {0} else {1}}}, Name)
                $rows     = $items | ForEach-Object {
                    $isDir = $_ -is [System.IO.DirectoryInfo]
                    $href  = if ($isDir) { $_.Name + '/' } else { $_.Name }
                    $size  = if ($isDir) { '' } else { ('{0:N1} MB' -f ($_.Length / 1MB)) }
                    $ico   = if ($isDir) { '&#128193;' } else { '&#128196;' }
                    '<tr><td>' + $ico + ' <a href="' + $href + '">' + $_.Name + '</a></td><td style="text-align:right;color:#8b949e;padding-left:24px;white-space:nowrap">' + $size + '</td></tr>'
                }
                $t    = if ($relDisp) { $relDisp } else { 'Shared files' }
                $css  = '*{box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;padding:24px;margin:0}h2{color:#E8820C;margin-bottom:16px;font-size:18px}table{border-collapse:collapse;width:100%;max-width:720px}td{padding:8px 14px;border-bottom:1px solid #30363d;font-size:14px}tr:hover td{background:#161b22}a{color:#58a6ff;text-decoration:none}a:hover{color:#E8820C;text-decoration:underline}.note{color:#8b949e;font-size:12px;margin-top:16px}'
                $html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + $t + '</title><style>' + $css + '</style></head><body><h2>' + $t + '</h2><table>' + $parentLi + ($rows -join '') + '</table><p class="note">Temporary host file server. Available while Copy Local Files step is running.</p></body></html>'
                $enc  = [System.Text.Encoding]::UTF8.GetBytes($html)
                $resp.ContentType     = 'text/html; charset=utf-8'
                $resp.ContentLength64 = $enc.Length
                $resp.OutputStream.Write($enc, 0, $enc.Length)
                $resp.StatusCode = 200
            } else { $resp.StatusCode = 404 }
        } catch {}
        finally { try { $ctx.Response.Close() } catch {} }
    }
}).AddParameter('lsnr', $listener).AddParameter('root', $script:softRoot) | Out-Null
$serverHandle = $psCmd.BeginInvoke()

$script:browseUrl = 'http://' + $script:hostIp + ':' + $script:port + '/'
Write-Output "Browse shared files in VM browser: $script:browseUrl"
try {
    $url = $script:browseUrl
    Invoke-Command -VMName $script:VMName -Credential $script:cred -ScriptBlock {
        Start-Process $using:url
    } -ErrorAction SilentlyContinue
} catch {}

function Copy-ViaHttp([string]$RelPath) {
    $fileName   = Split-Path $RelPath -Leaf
    $encodedRel = $RelPath.Replace('\\', '/').Split('/') | ForEach-Object { [Uri]::EscapeDataString($_) }
    $fileUrl    = "http://$script:hostIp\`:$script:port/$($encodedRel -join '/')"
    $destPath   = "C:\\Install\\$RelPath"
    $totalBytes = (Get-Item (Join-Path $script:softRoot $RelPath)).Length

    $dlSess   = New-PSSession -VMName $script:VMName -Credential $script:cred
    $pollSess = New-PSSession -VMName $script:VMName -Credential $script:cred
    $dlJob    = $null
    try {
        Invoke-Command -Session $pollSess -ScriptBlock {
            New-Item -ItemType Directory (Split-Path $using:destPath -Parent) -Force | Out-Null
        }
        $dlJob = Invoke-Command -Session $dlSess -AsJob -ScriptBlock {
            (New-Object System.Net.WebClient).DownloadFile($using:fileUrl, $using:destPath)
        }
        while ($dlJob.State -eq 'Running') {
            Start-Sleep -Seconds 2
            try {
                $done = Invoke-Command -Session $pollSess -ScriptBlock {
                    if (Test-Path $using:destPath) { (Get-Item $using:destPath).Length } else { [long]0 }
                }
                $doneMB  = [math]::Round($done / 1MB, 1)
                $totalMB = [math]::Round($totalBytes / 1MB, 1)
                $pct     = [int]([math]::Min(99, $done * 100 / $totalBytes))
                Write-Output ("DLPROG:{0}:{1}:{2}:{3}" -f $fileName, $doneMB, $totalMB, $pct)
            } catch {}
        }
        try { Receive-Job $dlJob -Wait -ErrorAction Stop | Out-Null }
        catch {
            $msg = if ($_.Exception.InnerException) { $_.Exception.InnerException.Message } else { $_.Exception.Message }
            throw "Copy failed for '$fileName': $msg"
        }
    } finally {
        if ($null -ne $dlJob) { Remove-Job $dlJob -Force -ErrorAction SilentlyContinue }
        Remove-PSSession $dlSess, $pollSess -ErrorAction SilentlyContinue
    }
}

$script:failed = @()
try {
${perFile}
    if ($script:failed.Count -gt 0) { throw "Copies failed: $($script:failed -join ', ')" }
    Write-Output "All files copied. Verify in VM browser: $script:browseUrl"
    try {
        $url = $script:browseUrl
        Invoke-Command -VMName $script:VMName -Credential $script:cred -ScriptBlock {
            Start-Process $using:url
        } -ErrorAction SilentlyContinue
    } catch {}
    Start-Sleep -Seconds 15
} finally {
    $listener.Stop(); $listener.Close()
    try { $psCmd.Stop() } catch {}
    $runspace.Close(); $runspace.Dispose()
    Remove-NetFirewallRule -DisplayName $script:ruleName -ErrorAction SilentlyContinue
}
`;
}

function psInstallLocal() {
  const lines = S.localFiles.map(rel => {
    const fn = rel.split('/').pop();
    const ext = fn.split('.').pop().toLowerCase();
    if (ext === 'zip') return `Write-Output "[SKIP] ZIP already extracted: ${fn}";`;
    const winRel = rel.replace(/\//g, '\\');
    const iPath = `C:\\Install\\${winRel}`;
    if (S.installMode === 'silent') {
      return `Write-Output "Installing (silent): ${fn}"; Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock { $p = Start-Process -FilePath "${iPath}" -ArgumentList "/S" -Wait -PassThru; Write-Output "Exit: $($p.ExitCode)" };`;
    }
    return `Write-Output "Launching (interactive): ${fn}"; Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock { Start-Process "${iPath}" };`;
  }).join('\n');
  return psCred() + '\n' + lines;
}

function psWinget() {
  const lines = S.wingetPkgs.map(id =>
    `Write-Output "Installing ${id}..."; winget install --id "${id}" --source winget --exact --silent --accept-package-agreements --accept-source-agreements 2>&1; Write-Output "Done: ${id}";`
  ).join('\n    ');
  return psCred() + `
Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
    winget source update 2>&1
    ${lines}
    Write-Output "All packages processed."
}
# winget returns non-zero when package is already at latest version -- treat as success
exit 0`;
}

function psNestedVirt() {
  return `$VMName = "${e(S.vmName)}"
Write-Output "Stopping VM to enable nested virtualization..."
Stop-VM $VMName -Force -ErrorAction SilentlyContinue
Set-VMProcessor -VMName $VMName -ExposeVirtualizationExtensions $true
Start-VM $VMName
Write-Output "Nested virtualization enabled. VM starting."`;
}

function psWSLFeatures() {
  return psCred() + `
Write-Output "Enabling WSL features inside VM..."
# Each DISM command runs in its own session to avoid PSSessionStateBroken.
# Start-Process -Wait detaches DISM from the PS runspace so session disruptions don't break the pipe.
try {
    Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
        Write-Output "Enabling VirtualMachinePlatform..."
        $p = Start-Process "dism.exe" -ArgumentList "/online /enable-feature /featurename:VirtualMachinePlatform /all /norestart" -Wait -PassThru -NoNewWindow
        Write-Output "VirtualMachinePlatform exit: $($p.ExitCode)"
    }
} catch { Write-Output "VirtualMachinePlatform: $($_.Exception.Message)" }

try {
    Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
        Write-Output "Enabling Microsoft-Windows-Subsystem-Linux..."
        $p = Start-Process "dism.exe" -ArgumentList "/online /enable-feature /featurename:Microsoft-Windows-Subsystem-Linux /all /norestart" -Wait -PassThru -NoNewWindow
        Write-Output "WSL exit: $($p.ExitCode)"
    }
} catch { Write-Output "WSL feature: $($_.Exception.Message)" }

Write-Output "WSL features step done -- reboot required."`;
}

function psWSLInstall() {
  return psCred() + `
Write-Output "Installing WSL2 kernel inside VM..."
Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
    $msi = "$env:TEMP\\wsl_kernel.msi"
    Invoke-WebRequest -Uri "https://wslstorestorage.blob.core.windows.net/wslblob/wsl_update_x64.msi" -OutFile $msi -UseBasicParsing
    msiexec /i $msi /quiet /norestart
    Remove-Item $msi -ErrorAction SilentlyContinue
    wsl --set-default-version 2
    Write-Output "WSL2 kernel installed."
}`;
}

function psDockerInstall() {
  return psCred() + `
Write-Output "Installing Chocolatey and Docker Desktop..."
Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
    if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = 3072
        iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
    }
    choco install docker-desktop -y
    Write-Output "Docker Desktop installed."
}`;
}

function psComposeUp() {
  const total = S.models.length;
  const modelPulls = S.models.map((m, i) => {
    const n = i + 1;
    return `Write-Output "TASK:Pulling model: ${m} (${n}/${total})"\n    docker exec ollama ollama pull ${m} 2>&1\n    if ($LASTEXITCODE -ne 0) { Write-Output "  [WARN] pull exited $LASTEXITCODE" }\n    Write-Output "TASK:Model ${m} ready (${n}/${total})"`;
  }).join('\n    ');
  return psCred() + `
Write-Output "TASK:Starting Docker Desktop"
Invoke-Command -VMName $VMName -Credential $cred -ScriptBlock {
    Start-Process "C:\\Program Files\\Docker\\Docker\\Docker Desktop.exe" -ErrorAction SilentlyContinue
    $until   = (Get-Date).AddSeconds(180)
    $ready   = $false
    $attempt = 0
    while ((Get-Date) -lt $until) {
        docker info 2>&1 | Out-Null
        if ($LASTEXITCODE -eq 0) { Write-Output "TASK:Docker daemon ready"; $ready = $true; break }
        $attempt++
        Write-Output "TASK:Waiting for Docker daemon (attempt $attempt)"
        Start-Sleep 10
    }
    if (-not $ready) { throw "Docker daemon did not become ready within 180s" }

    Write-Output "TASK:Writing docker-compose.yml"
    New-Item -ItemType Directory -Path "C:\\ollama-ssl" -Force | Out-Null
    Set-Content "C:\\ollama-ssl\\docker-compose.yml" @'
services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
  caddy:
    image: caddy
    container_name: caddy
    ports: ["443:443","80:80"]
    volumes: ["caddy_data:/data","caddy_config:/config"]
volumes:
  ollama:
  caddy_data:
  caddy_config:
'@
    Write-Output "TASK:Starting containers (docker compose up)"
    docker compose -f "C:\\ollama-ssl\\docker-compose.yml" up -d --force-recreate
    Write-Output "TASK:Containers started"
    ${modelPulls}
    Write-Output "TASK:Deployment complete"
}`;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function toggleArr(arr, val) {
  const i = arr.indexOf(val);
  if (i >= 0) arr.splice(i, 1); else arr.push(val);
}

function selectFeature(i) {
  S.features = [...FEATURE_OPTS[i].val];
  App.showPanel('features');
}

function goFromVM() {
  if (!S.vmName) { alert('Select a VM.'); return; }
  App.showPanel(hasWSL() ? 'models' : 'downloads');
}

function addCustomModel() {
  const v = document.getElementById('customModel')?.value.trim();
  if (v && !S.models.includes(v)) { S.models.push(v); App.showPanel('models'); }
}

function saveCreds() {
  S.vmUser = document.getElementById('u')?.value.trim() || '';
  S.vmPass = document.getElementById('p')?.value || '';
  if (!S.vmUser) { alert('Enter VM username.'); return; }
  App.saveState().then(() => App.showPanel('execute'));
}

function folderAll(folder, sel) {
  const f = softwares.find(x => x.folder === folder);
  if (!f) return;
  f.files.forEach(fi => {
    const i = S.localFiles.indexOf(fi.relativePath);
    if (sel && i < 0) S.localFiles.push(fi.relativePath);
    if (!sel && i >= 0) S.localFiles.splice(i, 1);
  });
  App.showPanel('local');
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeBtn(theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeBtn(next);
}

function updateThemeBtn(theme) {
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  const toArr = d => Array.isArray(d) ? d : [];
  await Promise.all([
    fetch('/api/config').then(r=>r.json()).then(d=>{ if(d.scriptDir) scriptDir=d.scriptDir; }).catch(()=>{}),
    fetch('/api/vms').then(r=>r.json()).then(d=>{ vms=toArr(d); }).catch(()=>{}),
    fetch('/api/downloads').then(r=>r.json()).then(d=>{ downloads=toArr(d); }).catch(()=>{}),
    fetch('/api/softwares').then(r=>r.json()).then(d=>{ softwares=toArr(d); }).catch(()=>{}),
    fetch('/api/winget').then(r=>r.json()).then(d=>{ winget=toArr(d); }).catch(()=>{}),
    fetch('/api/models').then(r=>r.json()).then(d=>{ models=toArr(d); }).catch(()=>{}),
    fetch('/api/state').then(r=>r.json()).then(st=>{
      if (st.VMName)       S.vmName       = st.VMName;
      if (st.Features?.length)    S.features    = st.Features;
      if (st.Models?.length)      S.models      = st.Models;
      if (st.DownloadUrls?.length)S.downloadUrls= st.DownloadUrls;
      if (st.LocalFiles?.length)  S.localFiles  = st.LocalFiles;
      if (st.WingetPkgs?.length)  S.wingetPkgs  = st.WingetPkgs;
      if (st.InstallMode)  S.installMode  = st.InstallMode;
      if (st.CopyMethod)   S.copyMethod   = st.CopyMethod;
      if (st.Completed?.length)   S.completed   = st.Completed;
    }),
  ]);
  WS.connect();
  renderSidebar();
  App.showPanel('features');
  initTheme();
}

async function reloadVMs() {
  vms = await fetch('/api/vms').then(r=>r.json()).then(d=>Array.isArray(d)?d:[]).catch(()=>[]);
  App.showPanel('vm');
}

init();
</script>
